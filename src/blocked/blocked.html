<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blocked — Warden</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        color: #eaeaea;
      }
      main {
        text-align: center;
        padding: 32px;
        max-width: 440px;
      }
      .seal {
        font-size: 48px;
        margin-bottom: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .site {
        font-family: ui-monospace, monospace;
        opacity: 0.7;
        word-break: break-all;
        margin-bottom: 24px;
      }
      .count {
        font-size: 44px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        margin: 8px 0;
      }
      .hint {
        font-size: 13px;
        opacity: 0.6;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="seal">⛔</div>
      <h1>Warden is on watch</h1>
      <div class="site" id="site"></div>
      <div id="status">Loading…</div>
      <div class="count" id="count">--:--</div>
      <div class="hint">Break unlocks this site. Reset the session from the Warden popup if you truly need through.</div>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
